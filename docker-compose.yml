version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kotkompas_app
    working_dir: /var/www/html
    restart: unless-stopped
    volumes:
      - .:/var/www/html:cached
    env_file:
      - .env
    depends_on:
      - mailpit
    networks:
      - kotkompas

  nginx:
    image: nginx:alpine
    container_name: kotkompas_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html:cached
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - kotkompas

  mailpit:
    image: axllent/mailpit:latest
    container_name: kotkompas_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
    networks:
      - kotkompas

networks:
  kotkompas:
    driver: bridge
